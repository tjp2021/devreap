version: 2

builds:
  - main: ./cmd/devreap
    binary: devreap
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/tjp2021/devreap/internal/cli.Version={{.Version}}
      - -X github.com/tjp2021/devreap/internal/cli.Commit={{.Commit}}
      - -X github.com/tjp2021/devreap/internal/cli.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: tjp2021
      name: homebrew-devreap
    homepage: "https://github.com/tjp2021/devreap"
    description: "Automatically detect and kill orphaned developer processes"
    license: "MIT"
    install: |
      bin.install "devreap"
    test: |
      system "#{bin}/devreap", "version"
